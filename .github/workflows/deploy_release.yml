# This is a basic workflow to help you get started with Actions

name: Deploy TTswap doc to Production Environment

# Controls when the workflow will run
on:
  push:
    branches: [ "release" ]

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    environment: doc-master-machine

    env:
      NODE_VERSION: '22'

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Runs a single command using the runners shell
      - name: install node
        uses: actions/setup-node@v4
        with:
          # 选择要使用的 node 版本
          node-version: 22
          # 缓存 npm 依赖
          cache: npm


      - name: Install dependencies
        run: npm ci

      - name: Build documentation site
        run: npm run build

      - name: Deploy to server
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > key.pem
          chmod 600 key.pem
          SSH_OPTS="-o StrictHostKeyChecking=no -i key.pem"
          REMOTE="${{ secrets.SSH_USERNAME }}@${{ secrets.SERVER_IP }}"
          DOCS_BASE="/mydata/nginx/html"

          ssh $SSH_OPTS "$REMOTE" "rm -rf ${DOCS_BASE}/docs_new && mkdir -p ${DOCS_BASE}/docs_new"
          scp $SSH_OPTS -r build/* "$REMOTE:${DOCS_BASE}/docs_new/"

          ssh $SSH_OPTS "$REMOTE" bash -s <<'EOF'
          set -euo pipefail
          DOCS_BASE="/mydata/nginx/html"
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          cd "$DOCS_BASE"

          if [ -d docs ]; then
            mv docs "docs_${TIMESTAMP}"
          fi
          mv docs_new docs

          # 保留最近 10 个 docs_* 备份，删除更旧的
          ls -1dt docs_[0-9]* 2>/dev/null | tail -n +11 | xargs -r rm -rf
          EOF

      # - name: Restart Nginx (optional)
